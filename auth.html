  <!-- Custom Auth Page Styling -->
  <style>
    body {
      background: var(--bg-app, #f8fafc);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      margin: 0;
      font-family: 'Cairo', 'IBM Plex Sans Arabic', sans-serif;
    }
    
    .auth-nav {
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-color, #e2e8f0);
      background: var(--bg-card, #ffffff);
    }

    .dark-mode .auth-nav {
      background: #1e293b;
      border-color: #334155;
    }

    .icon-btn {
      background: var(--bg-hover, #f1f5f9) !important;
      border: 1px solid var(--border-color, #e2e8f0) !important;
      color: var(--text-primary, #1e293b) !important;
    }
    .icon-btn:hover {
      background: var(--bg-active, #e2e8f0) !important;
    }

    .auth-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .brand-logo {
      width: 35px;
      height: 35px;
    }

    .brand-title {
      font-weight: 700;
      color: var(--text-primary, #1e293b);
      font-size: 1.2rem;
    }

    .auth-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    .auth-card {
      background: var(--bg-card, #ffffff);
      border: 1px solid var(--border-color, #e2e8f0);
      border-radius: 16px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
      width: 100%;
      max-width: 440px;
      padding: 40px;
      box-sizing: border-box;
      transition: all 0.3s ease;
    }

    .dark-mode .auth-card {
      background: #1e293b;
      border-color: #334155;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .auth-header h2 {
      font-size: 1.6rem;
      font-weight: 700;
      margin: 0 0 8px 0;
      color: var(--text-primary, #1e293b);
    }

    .auth-header p {
      font-size: 0.9rem;
      color: var(--text-secondary, #64748b);
      margin: 0;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .btn-block {
      display: block;
      width: 100%;
    }

    .auth-footer {
      text-align: center;
      margin-top: 25px;
      border-top: 1px dashed var(--border-color, #e2e8f0);
      padding-top: 20px;
    }

    .dark-mode .auth-footer {
      border-color: #334155;
    }

    .auth-error {
      background: #fef2f2;
      border: 1px solid #fee2e2;
      color: #ef4444;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 20px;
      display: none;
    }

    .dark-mode .auth-error {
      background: rgba(239, 68, 68, 0.1);
      border-color: rgba(239, 68, 68, 0.2);
    }

    @media (max-width: 480px) {
      .auth-nav {
        padding: 15px 20px;
      }
      .auth-container {
        padding: 20px 10px;
      }
      .auth-card {
        padding: 25px 20px;
        border-radius: 12px;
      }
      .auth-header {
        margin-bottom: 20px;
      }
      .auth-header h2 {

      }
    }

  <!-- Firebase App, Firestore, Auth, and App Check Compat - v10.14.1 -->

  <!-- Protection logic script -->
  <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@4/dist/fp.min.js"></script>
  <script src="js/protection.js?v=4"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Initialize the protection system (it will apply the synchronized theme automatically)
      if (window.ProtectionSystem) {
        window.ProtectionSystem.init();
      }

      // Toggle theme functionality
      document.getElementById('theme-toggle')?.addEventListener('click', () => {
        const currentTheme = localStorage.getItem('theme') || 'light';
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        
        document.body.classList.remove('light-mode', 'dark-mode');
        document.body.classList.add(newTheme === 'dark' ? 'dark-mode' : 'light-mode');
        localStorage.setItem('theme', newTheme);
        
        // Also update Firestore settings if user is logged in
        if (window.ProtectionSystem) {
          const activeState = window.ProtectionSystem.getState();
          const uid = activeState.userType === 'registered' ? activeState.userId : activeState.guestId;
          const collectionName = activeState.userType === 'registered' ? 'users' : 'guests';
          if (uid && typeof firebase !== 'undefined' && firebase.apps.length) {
            firebase.firestore().collection(collectionName).doc(uid).set({
              settings: { theme: newTheme }
            }, { merge: true }).catch(err => console.warn("Failed to sync theme to Firestore:", err));
          }
        }
      });
    });
  </script>
